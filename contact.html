<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>War Battle - Contact</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(120deg, #1e1e2f, #2c2c54);
    color: white;
}

header {
    background: #111;
    padding: 15px;
    text-align: center;
}

nav a {
    color: #00d4ff;
    margin: 0 10px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #ff4d4d;
}

main {
    padding: 20px;
}

.form-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
    margin: auto;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

textarea {
    height: 120px;
}

.btn {
    background: #00d4ff;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
}

.btn:hover {
    background: #ff4d4d;
    color: white;
}

footer {
    background: #111;
    text-align: center;
    padding: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <h1>War Battle</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="regles.html">Règles</a>
        <a href="materiel.html">Matériel</a>
        <a href="strategie.html">Stratégie</a>
        <a href="jeu.html">Jeu</a>
        <a href="contact.html">Nous contacter</a>
    </nav>
</header>

<main>

<h2>📩 Nous contacter</h2>

<div class="form-box">

    <input type="text" id="nom" placeholder="Votre nom">

    <input type="text" id="objet" placeholder="Objet">

    <textarea id="message" placeholder="Votre message..."></textarea>

    <button class="btn" onclick="envoyer()">📨 Envoyer</button>

</div>

</main>

<footer>
    <p>Site créé par un des ado 😎</p>
    <p>Contactez nous : warbattle2027@outlook.com</p>
    <p>index, plan du site :</p>
        <a href="index.html">Accueil</a>
        <a href="regles.html">Règles</a>
        <a href="materiel.html">Matériel</a>
        <a href="strategie.html">Stratégie</a>
        <a href="jeu.html">Jeu</a>
        <a href="contact.html">Nous contacter</a>
</footer>

<script>
function envoyer() {
    let nom = document.getElementById("nom").value;
    let objet = document.getElementById("objet").value;
    let message = document.getElementById("message").value;

    let mail = "mailto:warbattle2027@outlook.com"
        + "?subject=" + encodeURIComponent(objet)
        + "&body=" + encodeURIComponent(
            "Nom : " + nom + "\n\nMessage :\n" + message
        );

    window.location.href = mail;
}
</script>

</body>
</html>
